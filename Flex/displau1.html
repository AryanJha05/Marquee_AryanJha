<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layouts</title>

    <style>
        body{
            margin: 0; 
            padding: 0;
        }
      /* Common Box Style */
      .box {
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        font-weight: bold;
      }

    

      /* Header */
      .header {
        width: 100%;
        height: 90px;
        background-color: #6f1e2e;
        border: 2px solid crimson;
        margin-bottom: 5px;
      }

      /* Nav */
      .nav {
        width: 100%;
        height: 70px;
        background-color: #745408;
        border: 2px solid orange;
        margin-bottom: 5px;
      }

      /* Main + Aside Container */
      .content {
        width: 100%;
        height: 420px;
        display: flex;
        gap: 5px;
        margin-bottom: 5px;
      }

      /* Main */
      .main {
        width: 75%;
        height: 100%;
        background-color: #113c52;
        border: 2px solid #00bfff;

        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }

      /* Article */
      .article {
        width: 45%;
        height: 85%;
        background-color: #155e75;
        border: 2px solid #06b6d4;
      }

      /* Section */
      .section {
        width: 45%;
        height: 85%;
        background-color: #155e75;
        border: 2px solid #06b6d4;
      }

      /* Aside */
      .aside {
        width: 25%;
        height: 100%;
        background-color: #14532d;
        border: 2px solid #22c55e;
      }

      /* Footer */
      .footer {
        width: 100%;
        height: 120px;
        background-color: #6f1e2e;
        border: 2px solid crimson;
      }
    </style>
  </head>

  <body>
    <div class="header box">&lt;header&gt;</div>

    <div class="nav box">&lt;nav&gt;</div>

    <div class="content">
      <div class="main box">
    
        <div class="article box">&lt;article&gt;</div>

        <div class="section box">&lt;section&gt;</div>
      </div>

      <div class="aside box">&lt;aside&gt;</div>
    </div>

    <div class="footer box">&lt;footer&gt;</div>
  </body>
</html>
