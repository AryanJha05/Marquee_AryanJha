<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        body{
            margin: 0;
        }
        .nav{
            width: 100%;
            height: 80px;
            background-color: rgb(200, 197, 197);
            position: fixed;
            top: 0;
        }
        .logo{
            width: 60px;
            height: 60px;
            display: inline-block;
            background-color: rgb(247, 118, 118);
            border-radius: 50%;
            text-align: center;
            line-height: 60px;
            margin: 10px 20px 0px 50px;
        }
        div.searchBar{
            width: 500px;
            height: 40px;
            background-color: rgb(176, 187, 245);
            border-radius: 20px;
            margin-top: 20px;
            display: inline-block;
            position: absolute;
            right: 500px;
        }
        .box1{
            width: 150px;
            height: 40px;
            background-color: rgb(193, 243, 168);
            margin: 20px;
            display: inline-block;
            border-radius: 15px;
            position: absolute;
            right: 100px;
        }
        .box2{
            width: 150px;
            height: 40px;
            background-color: rgb(208, 249, 186);
            margin: 20px;
            display: inline-block;
            border-radius: 15px;
            position: absolute;
            right: 300px;
        }
    </style>
</head>
<body>
    
    <div class="nav">
        <div class="logo">AJ</div>
        <div class="searchBar"></div>
        <div class="box1"></div>
        <div class="box2"></div>
    </div>

    <div style="width: 300px; height: 300px; background-color: rgb(197, 246, 124); margin-top: 80px;"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(84, 101, 58);"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(151, 170, 124);"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(65, 105, 5);"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(197, 246, 124);"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(96, 157, 5);"></div>
    <div style="width: 300px; height: 300px; background-color: rgb(38, 62, 1);"></div>

    
</body>
</html>
