      //String Methods : chartAt(), charCodeAt(), concat(), endsWith(), includes(), indexOf(), lastIndexOf(), match(), repeat(), replace(), search(), slice(), split(), startsWith(), substr(), substring(), toLowerCase(), toUpperCase(), trim()

      // ===============================================
      // String Methods in JavaScript
      // ===============================================

      let str = "  Hello JavaScript World  ";

      console.log("Original String:", str);

      // 1. charAt() : Returns the character at a specified index in a string.
      console.log("charAt(2):", str.charAt(2));

      // 2. charCodeAt() : Returns the Unicode of the character at a specified index in a string.
      console.log("charCodeAt(2):", str.charCodeAt(2));

      // 3. concat() : Combines two or more strings and returns a new string.
      let str2 = "Programming";
      console.log("concat():", str.trim().concat(" ", str2));

      // 4. endsWith() : Determines whether a string ends with the characters of a specified string.
      console.log("endsWith('World  '):", str.endsWith("World  "));

      // 5. includes() : Determines whether one string may be found within another string.
      console.log("includes('Java'):", str.includes("Java"));

      // 6. indexOf() : Returns the index of the first occurrence of a specified value in a string.
      console.log("indexOf('Java'):", str.indexOf("Java"));

      // 7. lastIndexOf() : Returns the index of the last occurrence of a specified value in a string.
      let text = "apple banana apple mango";
      console.log("lastIndexOf('apple'):", text.lastIndexOf("apple"));

      // 8. match() : Searches a string for a match against a regular expression and returns the result.
      let sentence = "I love JavaScript";
      console.log("match('Java'):", sentence.match("Java"));

      // 9. repeat() : Returns a new string with a specified number of copies of an existing string.
      console.log("repeat(3):", "Hi ".repeat(3));

      // 10. replace() : Replaces a specified value with another value in a string.
      console.log("replace():", sentence.replace("JavaScript", "Python"));

      // 11. search() : Searches a string for a specified value and returns the position of the match.
      console.log("search('Java'):", sentence.search("Java"));

      // 12. slice() : Extracts a part of a string and returns the extracted part.
      console.log("slice(2, 8):", sentence.slice(2, 8));

      // 13. split() : Splits a string into an array of substrings.
      let fruits = "Apple,Banana,Mango";
      console.log("split(','):", fruits.split(","));

      // 14. startsWith() : Determines whether a string starts with the characters of a specified string.
      console.log("startsWith('I'):", sentence.startsWith("I"));

      // 15. substr()  (Deprecated but still works) : Returns a portion of a string, starting at the specified index and extending for a given number of characters.
      console.log("substr(2, 5):", sentence.substr(2, 5));

      // 16. substring() : Returns the part of a string between the specified indices.
      console.log("substring(2, 8):", sentence.substring(2, 8));

      // 17. toLowerCase() : Converts a string to lowercase letters.
      console.log("toLowerCase():", sentence.toLowerCase());

      // 18. toUpperCase() : Converts a string to uppercase letters.
      console.log("toUpperCase():", sentence.toUpperCase());
