<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #1b1b1b;
        font-family: Arial, Helvetica, sans-serif;
      }

      .calculator {
        width: 350px;
        background: #2d2d2d;
        padding: 18px;
        border-radius: 15px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      }

      .display {
        height: 80px;
        background: #111;
        color: #00ff66;
        border-radius: 10px;
        margin-bottom: 15px;
        padding: 15px;
        font-size: 34px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        font-family: monospace;
        overflow: hidden;
      }

      /* Main Layout */

      .Button {
        display: grid;
        grid-template-columns: 3fr 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }

      /* Top Buttons */

      .TopButton {
        grid-column: 1 / 3;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      /* Number Buttons */

      .NumberButton {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      /* Side Buttons */

      .sideButton {
        display: grid;
        grid-column: 2 / 3;
        grid-template-rows: repeat(2, 1fr);
        grid-row: 2 / 4;
        gap: 10px;
      }

      .sideButton .ButtonBox {
        height: 100%;
      }

      /* Bottom Buttons */

      .BottomButton {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 10px;
      }

      /* Buttons */

      .ButtonBox {
        height: 65px;
        border-radius: 10px;
        background: #4a4a4a;
        color: white;
        font-size: 24px;
        font-weight: bold;

        display: flex;
        justify-content: center;
        align-items: center;

        cursor: pointer;
        user-select: none;
        transition: 0.2s;
      }

      .ButtonBox:hover {
        background: #666;
      }

      .ButtonBox:active {
        transform: scale(0.95);
      }

      /* Operator Colors */
      .plus,
      .subtract,
      .multiply,
      .divide {
        color: #ff9800;
      }

      /* CE */

      .CE {
        color: #e53935;
      }

      /* Enter */

      .enter {
        color: purple;
      }

      /* Tablet (768px and below) */
      @media (max-width: 768px) {
        body {
          padding: 20px;
        }

        .calculator {
          width: 320px;
          padding: 15px;
        }

        .display {
          height: 70px;
          font-size: 30px;
        }

        .Button {
          gap: 10px;
        }

        .ButtonBox {
          height: 60px;
          font-size: 22px;
        }
      }

      /* Mobile (480px and below) */
      @media (max-width: 480px) {
        body {
          padding: 15px;
        }

        .calculator {
          width: 100%;
          max-width: 340px;
          padding: 12px;
        }

        .display {
          height: 65px;
          font-size: 28px;
          padding: 12px;
        }

        .Button {
          gap: 8px;
        }

        .TopButton,
        .NumberButton,
        .BottomButton,
        .sideButton {
          gap: 8px;
        }

        .ButtonBox {
          height: 55px;
          font-size: 20px;
          border-radius: 8px;
        }
      }

       /* Small Mobile (360px and below) */
      @media (max-width: 360px) {
        .calculator {
          max-width: 300px;
          padding: 10px;
        }

        .display {
          height: 60px;
          font-size: 24px;
        }

        .Button {
          gap: 6px;
        }

        .TopButton,
        .NumberButton,
        .BottomButton,
        .sideButton {
          gap: 6px;
        }

        .ButtonBox {
          height: 48px;
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display">Calculator</div>
      <div class="Button">
        <div class="TopButton">
          <div class="ButtonBox CE">CE</div>
          <div class="ButtonBox divide">/</div>
          <div class="ButtonBox multiply">*</div>
          <div class="ButtonBox subtract">-</div>
        </div>
        <div class="NumberButton">
          <div class="ButtonBox Button1">1</div>
          <div class="ButtonBox Button2">2</div>
          <div class="ButtonBox Button3">3</div>
          <div class="ButtonBox Button4">4</div>
          <div class="ButtonBox Button5">5</div>
          <div class="ButtonBox Button6">6</div>
          <div class="ButtonBox Button7">7</div>
          <div class="ButtonBox Button8">8</div>
          <div class="ButtonBox Button9">9</div>
        </div>

        <div class="sideButton">
          <div class="ButtonBox plus">+</div>
          <div class="ButtonBox enter">Enter</div>
        </div>
        <div class="BottomButton">
          <div class="ButtonBox Button0">0</div>
          <div class="ButtonBox decimal">.</div>
        </div>
      </div>
    </div>

    </script>
  </body>
</html>
