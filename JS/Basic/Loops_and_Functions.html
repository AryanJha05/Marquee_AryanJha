      //3 ==>
      function sumAll(...numbers) {
        return numbers.reduce((acc, curr) => acc + curr, 0);
      }
      cc.textContent += `3 => ${sumAll(1, 2, 3, 4, 5)}\n\n`;

      //4 ==>
      const isEven = (num) => {
        return num % 2 === 0;
      };
      cc.textContent += `4 => ${isEven(10)}\n\n`;

      //5 ==>

      function factorial(n) {
        if (n === 0 || n === 1) {
          return 1;
        }
        return n * factorial(n - 1);
      }
      cc.textContent += `5 => ${factorial(5)}\n\n`;
