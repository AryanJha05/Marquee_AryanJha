      //   Single-Threaded & Synchronous Behavior in JavaScript
      //   ==================================================

      //   1. What is a Thread?
      //   --------------------

      //   A thread is a path of execution in a program.

      //   Think of a thread as a worker.

      //   One worker  = One thread
      //   Many workers = Multiple threads

      //   ==================================================
      //   2. What is Single-Threaded?
      //   ==================================================

      //   JavaScript is a Single-Threaded language.

      //   This means JavaScript has only ONE thread (one worker) to execute code.

      //   It can perform only ONE task at a time.

      //   Example:

      //   Task 1 → Finish
      //         ↓
      //   Task 2 → Finish
      //         ↓
      //   Task 3 → Finish

      //   Example Code

      //   console.log("Task 1");
      //   console.log("Task 2");
      //   console.log("Task 3");

      //   Output

      //   Task 1
      //   Task 2
      //   Task 3

      //   JavaScript executes one statement after another.

      //   ==================================================
      //   Real Life Example
      //   ==================================================

      //   Imagine there is only ONE cashier at a shop.

      //   Customer 1 → Payment
      //           ↓
      //   Customer 2 → Payment
      //           ↓
      //   Customer 3 → Payment

      //   The cashier cannot serve Customer 2 until Customer 1 finishes.

      //   JavaScript works the same way.

      //   One thread
      //   One task at a time

      //   ==================================================
      //   3. What is Synchronous Behavior?
      //   ==================================================

      //   Synchronous means:

      //   👉 Execute code line by line.

      //   The next line waits until the current line finishes.

      //   Example

      //   console.log("Start");

      //   console.log("Learning JavaScript");

      //   console.log("End");

      //   Output

      //   Start
      //   Learning JavaScript
      //   End

      //   Every line waits for the previous line.

      //   ==================================================
      //   Real Life Example
      //   ==================================================

      //   Making Tea

      //   Step 1 → Boil Water
      //           ↓
      //   Step 2 → Add Tea
      //           ↓
      //   Step 3 → Add Milk
      //           ↓
      //   Step 4 → Drink Tea

      //   You cannot drink tea before boiling water.

      //   Everything happens in order.

      //   This is synchronous execution.

      //   ==================================================
      //   4. Blocking Behavior
      //   ==================================================

      //   Since JavaScript is single-threaded,
      //   a long-running task blocks everything else.

      //   Example

      //   console.log("Start");

      //   for(let i = 0; i < 1000000000; i++){
      //       // Heavy Work
      //   }

      //   console.log("End");

      //   Output

      //   Start
      //   (waits...)
      //   End

      //   The "End" statement waits until the loop finishes.

      //   This is called Blocking.

      //   ==================================================
      //   5. Why is JavaScript Single-Threaded?
      //   ==================================================

      //   It makes JavaScript:

      //   ✔ Easier to learn
      //   ✔ Easier to debug
      //   ✔ No race conditions
      //   ✔ Simpler memory management

      //   ==================================================

      //   ==================================================

      //   ==================================================

      //   Synchronous:

      //   ==================================================
      //   Memory Trick
      //   ==================================================

      //   Single-Threaded  → One Worker
