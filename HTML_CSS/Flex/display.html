<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Updated Layout Design</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container{
      width: 50%;
      border: 2px solid black;
      padding: 20px;
      background-color: lightyellow;
      margin: auto;
      margin-bottom: 40px;
    }

    /* Top Blue Section */
    .top-box{
      width: 100%;
      min-height: 120px;
      border: 2px solid black;
      background-color: skyblue;

      display: flex;
      justify-content: space-evenly;
      align-items: center;
      flex-wrap: wrap;

      padding: 10px;
    }

    /* Small Red Boxes */
    .small-box{
      width: 13%;
      height: 80px;
      border: 2px solid black;
      background-color: red;
    }

    /* Circle Shape */
    .circle{
      border-radius: 50%;
    }

    /* Middle Section */
    .middle{
      margin-top: 20px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      gap: 20px;
    }

    /* Left Pink Box */
    .left-box{
      width: 15%;
      height: 100px;
      border: 2px solid black;
      background-color: lightcoral;
    }

    /* Right Green Box */
    .right-box{
      width: 75%;
      height: 100px;
      border: 2px solid black;
      background-color: lightgreen;
    }

    /* Outer Container */
    .outer-box{
      width: 100%;
      border: 2px solid black;
      padding: 15px;
      background-color: white;
      margin-top: 20px;
    }

    /* Responsive Design */
    @media (max-width: 768px){

      .container{
        width: 95%;
      }

      .middle{
        flex-direction: column;
      }

      .left-box,
      .right-box{
        width: 100%;
      }

      .small-box{
        width: 40%;
        margin: 10px;
      }

    }

  </style>
</head>

<body>

  <!-- First Layout -->
  <div class="container">

    <!-- Top Section -->
    <div class="top-box">
      <div class="small-box"></div>
      <div class="small-box"></div>
      <div class="small-box"></div>
      <div class="small-box"></div>
    </div>

    <!-- Bottom Section -->
    <div class="middle">
      <div class="right-box"></div>
      <div class="left-box"></div>
    </div>

  </div>



  <!-- Second Layout -->
  <div class="container">

    <!-- Top Middle Section -->
    <div class="middle">
      <div class="left-box"></div>
      <div class="right-box"></div>
    </div>

    <!-- Circle Box Section -->
    <div class="top-box" style="margin-top:20px;">

      <div class="small-box circle"></div>

      <div class="small-box"></div>

      <div class="small-box circle"></div>

      <div class="small-box"></div>

    </div>

    <!-- Outer Section -->
    <div class="outer-box">

      <div class="middle">

        <div class="right-box"></div>

        <div class="left-box"></div>

      </div>

    </div>

  </div>

</body>
</html>
