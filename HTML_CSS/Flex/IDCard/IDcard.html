<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f2f5;
      }

      .card {
        width: 300px;
        background: white;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .blue {
        width: 100%;
        height: 120px;
        background: rgb(84, 84, 240);
      }

      .logo {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 4px solid rgb(84, 84, 240);
        margin: -80px auto 15px;
        background-image: url("img.JPG");
        background-size: cover;
        background-position: center;
      }

      .head h2 {
        margin-bottom: 5px;
      }

      .headIn h4 {
        color: rgb(75, 74, 74);
        font-weight: normal;
        margin-bottom: 15px;
      }

      .logos {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      .logoItem {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        cursor: pointer;
      }

      .facebook {
        background-image: url("https://i.pinimg.com/736x/70/79/c5/7079c577e4c2f45b889c912b73765007.jpg");
      }

      .twitter {
        background-image: url("https://tse1.mm.bing.net/th/id/OIP.DWM8afJiqq8KFJEpoIkj6AHaHa?rs=1&pid=ImgDetMain&o=7&rm=3");
      }

      .insta {
        background-image: url("https://tse1.mm.bing.net/th/id/OIP.mnB7-cyI-8zzFOf-1IbvvgAAAA?w=300&h=300&rs=1&pid=ImgDetMain&o=7&rm=3");
      }

      .youtube {
        background-image: url("https://tse1.mm.bing.net/th/id/OIP.5lH5B0LlKX3zDqG4flHoqwHaHZ?w=1383&h=1381&rs=1&pid=ImgDetMain&o=7&rm=3");
      }

      .bottons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }

      .botton {
        padding: 10px 18px;
        border-radius: 25px;
        background: rgb(84, 84, 240);
        color: white;
      }


      .likeShare {
        display: flex;
        justify-content: space-evenly;
        padding: 15px;
      }

      .like,
      .comment {
        border-right: 1px solid #ddd;
        padding-right: 15px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="blue"></div>

      <div class="logo"></div>

      <div class="head">
        <h2>CodingLab</h2>
      </div>

      <div class="headIn">
        <h4>YouTuber & Blogger</h4>
      </div>

      <div class="logos">
        <div class="logoItem facebook"></div>
        <div class="logoItem twitter"></div>
        <div class="logoItem insta"></div>
        <div class="logoItem youtube"></div>
      </div>

      <div class="bottons">
        <div class="botton">Subscribe</div>
        <div class="botton">Message</div>
      </div>

      <div class="likeShare">
        <div class="like">♡ 60.4K</div>
        <div class="comment">💬 1.2K</div>
        <div class="share">↗ 2.5K</div>
      </div>
    </div>
  </body>
</html>
