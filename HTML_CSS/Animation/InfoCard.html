<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Cards</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: #ececec;
      }

      .container {
        width: 320px;
        height: 520px;
        border: solid 2px #444;
        border-radius: 20px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        align-items: center;
        justify-content: center;

        gap: 15px;
      }

      /* Card */

      .card {
        width: 140px;
        height: 230px;

        position: relative;

        overflow: visible;
      }

      /* Information Box */

      .info {
        position: absolute;

        width: 140px;
        height: 230px;

        background: white;

        border-radius: 15px;

        border: 2px solid #444;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;

        opacity: 0;

        transform: translateX(30px);

        transition: 0.6s;

        z-index: 1;
      }

      .info h3 {
        margin-bottom: 10px;
      }

      .info p {
        padding: 0 10px;
        margin-bottom: 20px;
      }

      .info button {
        padding: 8px 15px;

        border: none;

        background: #0077ff;

        color: white;

        border-radius: 8px;

        cursor: pointer;
      }

      /* Image */

      .image {
        width: 140px;
        height: 230px;

        position: absolute;

        border-radius: 15px;

        background-size: cover;
        background-position: center;

        transition: 1s;

        z-index: 2;
      }

      /* Your Images */

      .image1 {
        background-image: url("images/image.png");
      }

      .image2 {
        background-image: url("images/image.png");
      }

      .image3 {
        background-image: url("images/image.png");
      }

      .image4 {
        background-image: url("images/image.png");
      }

      /* Hover Effect */

      .card:hover .image2, .card:hover .image4 {
        transform: translateX(-167px);
      }
      .card:hover .image1, .card:hover .image3 {
        transform: translateX(167px);
      }

      .card:hover .info {
        opacity: 1;

        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="info">
          <h3>Aryan Jha</h3>
          <p>B.Tech AIML Student</p>
          <button>View Profile</button>
        </div>

        <div class="image image1"></div>
      </div>

      <div class="card">
        <div class="info">
          <h3>Swapnil Sen</h3>
          <p>Frontend Developer</p>
          <button>View Profile</button>
        </div>

        <div class="image image2"></div>
      </div>

      <div class="card">
        <div class="info">
          <h3>XYZ</h3>
          <p>Java Developer</p>
          <button>View Profile</button>
        </div>

        <div class="image image3"></div>
      </div>

      <div class="card">
        <div class="info">
          <h3>Mahipal</h3>
          <p>UI/UX Designer</p>
          <button>View Profile</button>
        </div>

        <div class="image image4"></div>
      </div>
    </div>
  </body>
</html>
