<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Image Transition</title>
    <style>
      body {
        height: 100vh;
        background-color: #f0f0f0;
      }

      .container {
        width: 300px;
        height: 300px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        justify-items: center;
        align-items: center;

        border: 1px solid black;
        margin-left: 150px;
        background-image: url(images/img1.jpg);
        background-size: cover;
      }

      .box {
        width: 150px;
        height: 150px;
        background-color: #4caf50;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        font-weight: bold;

        transition: transform 0.5s ease-in-out;
      }

      .box1 {
        transform-origin: top left;
      }
      .box2 {
        transform-origin: top right;
      }
      .box3 {
        transform-origin: bottom left;
      }
      .box4 {
        transform-origin: bottom right;
      }

      .container:hover .box1 {
        transform: rotate(90deg);
      }

      .container:hover .box2 {
        transform: rotate(-90deg);
      }

      .container:hover .box3 {
        transform: rotate(-90deg);
      }

      .container:hover .box4 {
        transform: rotate(90deg);
      }

      /* Animation : */

      .fillmode {
        width: 500px;
        height: 350px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 50px;
        padding: 10px;

        border: 1px solid black;
      }

      .forward,
      .backward {
        width: 450px;
        height: 150px;
        display: flex;
        align-items: center;

        border: 1px solid black;
      }

      .fBox,
      .bBox {
        width: 100px;
        height: 100px;
        background: teal;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;

        animation: move 3s ease 1s 1;
      }

      .fBox {
        animation-fill-mode: forwards;
      }

      .bBox {
        animation-fill-mode: backwards;
      }

      #startButton {
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        border: 1px solid #ccc;
        border-radius: 50px;
        box-shadow: 0px 0px 5px #ccc;
        background-color: #7646a1;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s, background-color 0.3s;
      }

      #startButton:hover {
        transform: scale(1.1);
        box-shadow: 0px 0px 10px #7646a1;
        background-color: #5e3580;
      }

      @keyframes move {
        0% {
          transform: translateX(0);
          background: red;
        }

        100% {
          transform: translateX(350px);
          background: green;
        }
      }

      /* Responsive Design */
      @media (max-width: 600px) {
        h2 {
          font-size: 20px;
        }
        .container {
          width: 200px;
          height: 200px;
        }

        .box {
          width: 100px;
          height: 100px;
          font-size: 16px;
        }

        .fillmode {
          width: 300px;
          height: 300px;
          gap: 20px;
        }

        .forward,
        .backward {
          width: 300px;
          height: 150px;
        }

        @keyframes move {
          0% {
            transform: translateX(0);
            background: red;
          }

          100% {
            transform: translateX(198px);
            background: green;
          }
        }
      }

      /* Bouncing Ball */

      .BouncingBall {
        width: 500px;
        height: 500px;
        background: rgb(157, 202, 202);
        position: relative;
        overflow: hidden;
      }

      .ball {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: yellow;
        position: absolute;
        left: 0;
        top: 0;

        animation: bounce 2s linear infinite;
      }

      @keyframes bounce {
        0% {
          transform: translate(0, 0);
        }


        20% {
          transform: translate(100px, 70px);
        }

        30% {
          transform: translate(150px, 150px);
        }

        40% {
          transform: translate(200px, 170px);
        }

        50% {
          transform: translate(250px, 200px);
        }

        60% {
          transform: translate(300px, 250px);
        }

        70% {
          transform: translate(350px, 350px);
        }

        80% {
          transform: translate(400px, 370px);
        }

        100% {
          transform: translate(0, 0);
        }
      }
      .stair {
        width: 100px;
        height: 10px;
        background-color: rgb(0, 0, 0);
        position: relative;
      }

      .stair1 {
        top: 100px;
        left: 0px;
      }

      .stair2 {
        top: 200px;
        left: 100px;
      }

      .stair3 {
        top: 300px;
        left: 200px;
      }

      .stair4 {
        top: 400px;
        left: 300px;
      }

    </style>
  </head>
  <body>
    <h2>Transition :</h2>
    <div class="container">
      <div class="box box1">Box1</div>
      <div class="box box2">Box2</div>
      <div class="box box3">Box3</div>
      <div class="box box4">Box4</div>
    </div>

    <!-- Animation parameters ==> name, duration, timing-function, delay, iteration-count, direction, fill-mode, play-state -->
    <br />
    <hr />
    <h2>Animation :</h2>

    <div class="fillmode">
      <div class="forward">
        <div class="fBox">Forward</div>
      </div>

      <div class="backward">
        <div class="bBox">Backward</div>
      </div>

      <!-- StartButton -->
      <button id="startButton">Start Animation</button>
    </div>
    <br />
    <br />

    <div class="BouncingBall">
      <div class="ball"></div>

      <div class="stair stair1"></div>
      <div class="stair stair2"></div>
      <div class="stair stair3"></div>
      <div class="stair stair4"></div>
    </div>
    <hr />
  </body>
</html>
