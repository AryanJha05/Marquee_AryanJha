<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxes Layout</title>

    <style>
      :root {
        --box-size: 100px;
        --border: 2px solid black;
        --radius: 10px;
        --circle-radius: 50%;
        --gap: 10px;

        --container-width: 900px;
        --container-height: 430px;
        --container-display: flex;
        --container-direction: column;
        --container-gap: 20px;
        --container-padding: 20px;
        --container-margin-top: 50px;
        --container-position: relative;
        --container-left: 20%;

        --rect-height: 120px;
        --rect-width: 100%;
        --rect-background: lightblue;

        --layer2-gap: 130px;
        --justify-content: center;
        --align-items: center;

        --sq-width: 225px;
        --sq-height: 120px;
        --sw-background: lightcoral;

        --circle-size: 125px;
        --circle-display: inline-block;
        --circle-background: lightseagreen;

        --rect2-width: 83%;
        --rect2-height: 120px;
        --rect2-background: lightgreen;
      }

      * {
        margin: 0;
        padding: 0;
      }

      /* ALL BOXES */
      .box {
        width: var(--box-size);
        height: var(--box-size);
        border: var(--border);
        border-radius: var(--radius);
        display: inline-block;
        margin: var(--gap);
      }

      /* COLORS */
      .red {
        background: red;
      }
      .orange {
        background: orange;
      }
      .yellow {
        background: yellow;
      }
      .green {
        background: green;
      }
      .blue {
        background: blue;
      }
      .indigo {
        background: indigo;
      }
      .violet {
        background: violet;
      }
      .pink {
        background: pink;
      }
      .cyan {
        background: cyan;
      }
      .magenta {
        background: magenta;
      }
      .brown {
        background: brown;
      }
      .gray {
        background: gray;
      }
      .black {
        background: black;
      }
      .white {
        background: #f7fff9;
      }

      /* CONTAINER */
      .container {
        width: var(--container-width);
        height: var(--container-height);
        border: var(--border);

        display: var(--container-display);
        flex-direction: var(--container-direction);
        gap: var(--container-gap);

        position: var(--container-position);
        left: var(--container-left);

        padding: var(--container-padding);
        margin-top: var(--container-margin-top);
      }

      .rect1 {
        width: var(--rect-width);
        height: var(--rect-height);
        background: var(--rect-background);
        border: var(--border);
        border-radius: var(--radius);
      }

      .layer2 {
        display: var(--container-display);
        gap: var(--layer2-gap);
        justify-content: var(--justify-content);
        align-items: var(--align-items);
      }
      .layer3 {
        display: var(--container-display);
        gap: var(--container-gap);
        align-items: var(--align-items);
      }

      .sq {
        width: var(--sq-width);
        height: var(--sq-height);
        background: var(--sw-background);
        border: var(--border);
        border-radius: var(--radius);
      }

      .circle {
        width: var(--circle-size);
        height: var(--circle-size);
        display: var(--circle-display);
        background: var(--circle-background);
        border: var(--border);
        border-radius: var(--circle-radius);
      }

      .rect2 {
        width: var(--rect2-width);
        height: var(--rect2-height);
        background: var(--rect2-background);
        border: var(--border);
        border-radius: var(--radius);
      }


      .container2 {
        width: 90vw;
        height: 600px;
      }
      .part1 {
        width: 50em;
        height: 530px;
        display: flex;
        position: absolute;
        left: 100px;
      }
      .part2 {
        width: 50em;
        height: 530px;
        display: flex;
        position: absolute;
        left: 30%;
      }

      .slide {
        width: 150px;
        height: 150px;
        position: relative;
        border: var(--border);
        border-radius: var(--radius);
        box-shadow: 7.5px 7.5px rgba(0, 0, 0, 0.455);
      }
      .slide:hover {
        animation: rotate 5s linear infinite;
      }
      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .s1 {
        background: lightcoral;
        z-index: 1;
      }
      .s2 {
        top: 75px;
        right: 75px;
        background: lightseagreen;
        z-index: 2;
      }
      .s3 {
        top: 150px;
        right: 150px;
        background: lightblue;
        z-index: 3;
      }
      .s4 {
        top: 225px;
        right: 225px;
        background: lightgreen;
        z-index: 4;
      }
      .s5 {
        top: 300px;
        right: 300px;
        background: lightpink;
        z-index: 5;
      }
      .s6 {
        top: 375px;
        right: 375px;
        background: lightgray;
        z-index: 6;
      }

      .s11 {
        background: lightcoral;
        z-index: 6;
      }
      .s22 {
        top: 75px;
        right: 75px;
        background: lightseagreen;
        z-index: 5;
      }
      .s33 {
        top: 150px;
        right: 150px;
        background: lightblue;
        z-index: 4;
      }
      .s44 {
        top: 225px;
        right: 225px;
        background: lightgreen;
        z-index: 3;
      }
      .s55 {
        top: 300px;
        right: 300px;
        background: lightpink;
        z-index: 2;
      }
      .s66 {
        top: 375px;
        right: 375px;
        background: lightgray;
        z-index: 1;
      }

      .container3{
        width: 400px;
        height: 200px;
        display: inline-block;
        position: relative;
        left: 10%;
      }

      .b1{
        left:100px;
        z-index: 4;
        background: lightcoral;
      }
      .b2{
        bottom: 75px;
        z-index: 3;
        background: lightseagreen;
      }
      .b3{
        bottom: 225px;
        left: 200px;
        z-index: 3;
        background: lightblue;
      }
      .b4{
        bottom: 300px;
        left: 100px;
        z-index: 2;
        background: lightgreen;
      }

    </style>
  </head>

  <body>
    <!-- COLOR BOXES -->

    <div class="box red"></div>
    <div class="box orange"></div>
    <div class="box yellow"></div>
    <div class="box green"></div>
    <div class="box blue"></div>
    <div class="box indigo"></div>
    <div class="box violet"></div>
    <div class="box pink"></div>
    <div class="box cyan"></div>
    <div class="box magenta"></div>
    <div class="box brown"></div>
    <div class="box gray"></div>
    <div class="box black"></div>
    <div class="box white"></div>

    <hr style="margin: 50px 0" />

    <!-- MAIN CONTAINER -->

    <div class="container">
      <div class="rect1"></div>

      <div class="layer2">
        <div class="sq"></div>
        <div class="sq"></div>
        <div class="sq"></div>
      </div>
      <div class="layer3">
        <div class="circle"></div>
        <div class="rect2"></div>
      </div>
    </div>

    <hr style="margin: 50px 0" />


   <div class="container2">
     <div class="part1">
      <div class="slide s1"></div>
      <div class="slide s2"></div>
      <div class="slide s3"></div>
      <div class="slide s4"></div>
      <div class="slide s5"></div>
      <div class="slide s6"></div>
    </div>

    <div class="part2">
      <div class="slide s11"></div>
      <div class="slide s22"></div>
      <div class="slide s33"></div>
      <div class="slide s44"></div>
      <div class="slide s55"></div>
      <div class="slide s66"></div>
    </div>
   </div>

   <hr style="margin: 10px 0" />

   <div class="container3">
    <div class="slide b1"></div>
    <div class="slide b2"></div>
    <div class="slide b3"></div>
    <div class="slide b4"></div>

    <hr style="margin: 10px 0" />
   </div>
  </body>
</html>
