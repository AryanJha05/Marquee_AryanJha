<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road</title>

    <style>

        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
        }

        .road{
            width: 300px;
            height: 100vh;
            background-color: rgb(136, 132, 132);

            display: flex;
            justify-content: space-around;
        }

        .lane{
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        .whiteline{
            width: 12px;
            height: 80px;
            background-color: white;
        }

        .divider{
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .divider-yellow{
            width: 12px;
            height: 60px;
            background-color: yellow;
        }
        .divider-black{
            width: 12px;
            height: 60px;
            background-color: black;
        }

    </style>
</head>

<body>

    <div class="divider">
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
        </div>
    <div class="road">

        <div class="lane">
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
        </div>

        <div class="divider">
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
        </div>

        <div class="lane">
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
            <div class="whiteline"></div>
        </div>

    </div>
    <div class="divider">
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>
            <div class="divider-yellow"></div>
            <div class="divider-black"></div>

</body>
</html>
