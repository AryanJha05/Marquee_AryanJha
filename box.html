<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #228B22);
        }
        .container{
            display: flex;
            justify-content: center;
        }
        .box{
            width: 200px;
            height: 400px;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            border-radius: 50px;
        }
        .red{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: red;
        }
        .yellow{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
        }
        .green{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: green;
        }
        .poll{
            width: 25px;
            height: 225px;
            background-color: black;
            border-radius: 0 0 10px 10px;
            margin-left: 87px;
        }
    </style>
</head>
<body>
    <!-- Traffic light -->
    <div class="Container">
        <div class="box">
        <div class="red"></div>
        <div class="yellow"></div>
        <div class="green"></div>
    </div>
    <div class="poll"></div>
    </div>

</body>

</html>
