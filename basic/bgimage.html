<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        padding-top: 65px;
      }

      .navbar {
        height: 60px;
        background-color: rgb(34, 33, 33);

        display: flex;
        justify-content: flex-end;
        align-items: center;

        position: fixed;
        top: 0;
        left: 0;
        right: 0;

        padding-right: 100px;
      }

      .navbar .search {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: white;
        border: 1px solid white;
        border-radius: 10px;
        margin-left: 20px;
        background-color: rgb(34, 33, 33);
      }

      .search input[type="text"],
      .search button {
        border: none;
        background-color: transparent;
        border: none;
        color: white;
        padding: 5px;
      }
      .search input[type="text"] {
        border-right: 1px solid white;
        border-top-left-radius: 10px;
        border-bottom-left-radius: 10px;
      }
      .search button {
        border-top-right-radius: 10px;
        border-bottom-right-radius: 10px;
      }

      .navbar a {
        text-decoration: none;
        color: white;
        border: 1px solid white;
        border-radius: 10px;
        padding: 5px 10px;
        margin-left: 20px;
        background-color: rgb(34, 33, 33);
      }
      .navbar .search input[type="text"]:hover,
      .navbar .search button:hover,
      .navbar a:hover {
        background-color: whitesmoke;
        color: rgb(34, 33, 33);
      }

      .circle {
        width: 400px;
        height: 400px;
        border: 2px solid black;
        border-radius: 50%;
        background-image: url("spider-man-5120x2880-21603.jpg");
        background-size: cover;
        background-position: center;
      }

      .flexContainer {
        width: 400px;
        height: 400px;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        border: 2px solid black;
        background-color: rgb(196, 193, 193);
        justify-content: space-between;
        align-items: center;
        padding: 10px;
      }

      .flexItem {
        width: 100px;
        height: 100px;
        border: 1px solid black;
      }
      
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="search">
        <input type="text" placeholder="Search..." />
        <button>🔍︎</button>
      </div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>  
    <div class="circle"></div>
    <hr />
    <div class="flexContainer">
      <div class="flexItem div1" style="background-color: wheat">1</div>
      <div class="flexItem div2" style="background-color: rgb(169, 237, 169)">2</div>
      <div class="flexItem div3"style="background-color: white">3</div>
      <div class="flexItem div4" style="background-color: rgb(95, 205, 215)">4</div>
      <div class="flexItem div5" style="background-color: lightblue">5</div>
      <!-- <div class="flexItem" style="background-color: lightgreen"></div>
      <div class="flexItem" style="background-color: lightcoral"></div>
      <div class="flexItem" style="background-color: lightcyan"></div> -->

      <div class="flexItem" style="background-color: lightpink"></div>
      <div class="flexItem" style="background-color: lightseagreen"></div>
      <div class="flexItem" style="background-color: lightsteelblue"></div>
      <div class="flexItem" style="background-color: lightyellow"></div>

      <div class="flexItem" style="background-color: rgb(110, 103, 75)"></div>
      <div class="flexItem" style="background-color: rgb(149, 175, 95)"></div>
      <div class="flexItem" style="background-color: violet"></div>
      <div class="flexItem" style="background-color: rgb(168, 87, 87)"></div> -->
    </div>
    <hr />
  </body>
</html>
